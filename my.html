    <script>
        const loadingMask = document.getElementById('loadingMask');

        document.addEventListener('DOMContentLoaded', async function() {
            if (!getToken()) {
                window.location.href = 'login.html';
                return;
            }

            setTimeout(async () => {
                try {
                    const isValid = await checkLoginOnPageLoad();
                    if (!isValid) {
                        return;
                    }
                } catch (error) {
                }
            }, 100);

            initPage();
            
            if (window.unifiedProfitManager) {
                setTimeout(() => {
                    window.unifiedProfitManager.smartProfitCheck('page_my');
                }, 2000);
            }
        });

        function initPage() {
            loadUserInfo();
            loadAssetInfo();
        }

        async function loadUserInfo() {
            try {
                const user = await API.user.getInfo();
                const userIdElement = document.getElementById('userId');
                const userPhoneElement = document.getElementById('userPhone');
                
                if (userIdElement) {
                    userIdElement.textContent = user.id || user.user_id || '---';
                }
                if (userPhoneElement) {
                    userPhoneElement.textContent = user.phone || '---';
                }
            } catch (error) {
                const userIdElement = document.getElementById('userId');
                const userPhoneElement = document.getElementById('userPhone');
                if (userIdElement) {
                    userIdElement.textContent = '---';
                }
                if (userPhoneElement) {
                    userPhoneElement.textContent = '---';
                }
            }
        }

        async function loadAssetInfo() {
            try {
                const assets = await API.user.getBalance();
                const withdrawBalance = assets.withdraw_balance || 0;
                const rechargeBalance = assets.recharge_balance || 0;
                
                document.getElementById('withdrawBalance').textContent = '$' + formatMoney(withdrawBalance);
                document.getElementById('rechargeBalance').textContent = '$' + formatMoney(rechargeBalance);
                
            } catch (error) {
                document.getElementById('withdrawBalance').textContent = '$0';
                document.getElementById('rechargeBalance').textContent = '$0';
            }
        }

        async function confirmLogout() {
            try {
                showLoading();
                
                await API.user.logout();
                
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                
                window.location.href = 'login.html';
            } catch (error) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            } finally {
                hideLoading();
            }
        }

        function showLoading() {
            loadingMask.style.display = 'flex';
        }

        function hideLoading() {
            loadingMask.style.display = 'none';
        }

        function formatMoney(amount) {
            const numAmount = parseFloat(amount);
            if (isNaN(numAmount) || numAmount === null || numAmount === undefined) return '0';
            return Math.floor(numAmount).toLocaleString('es-MX');
        }
    </script>
