    <script>
        const investContainer = document.getElementById('investContainer');
        
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
            
            if (window.unifiedProfitManager) {
                setTimeout(() => {
                    window.unifiedProfitManager.smartProfitCheck('page_products');
                }, 2000);
            }
        });
        
        function initPage() {
            loadInvestments();
        }
        
        async function loadInvestments() {
            try {
                const data = await API.invest.getRecords();
                const investments = (data && data.records) ? data.records : [];
                renderInvestments(investments);
            } catch (error) {
                investContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8V12L15 15"/>
                            </svg>
                        </div>
                        <p class="empty-text">Error al cargar</p>
                        <p class="empty-hint">Inténtalo de nuevo más tarde</p>
                    </div>
                `;
            }
        }
        
        function renderInvestments(investments) {
            try {
                if (!investments || !Array.isArray(investments) || investments.length === 0) {
                    investContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                                    <path d="M3 9H21M9 21V9"/>
                                </svg>
                            </div>
                            <p class="empty-text">Aún no hay inversiones</p>
                            <p class="empty-hint">Comienza a invertir para construir tu portafolio</p>
                            <a href="index.html" class="empty-btn">
                                <span>Explorar productos</span>
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </a>
                        </div>
                    `;
                    return;
                }
                
                investContainer.innerHTML = investments.map((invest, index) => {
                    const amount = parseFloat(invest.amount || 0);
                    const dailyProfitRate = parseFloat(invest.daily_profit_rate || 0);
                    const dailyProfit = amount * dailyProfitRate;
                    const period = parseInt(invest.period || 0);
                    const issuedDays = parseInt(invest.issued_days || 0);
                    const issuedProfit = parseFloat(invest.issued_profit || 0);
                    const totalReturn = dailyProfit * period;
                    const productImage = invest.product_image || './uploads/product/default.png';
                    const progress = period > 0 ? Math.round((issuedDays / period) * 100) : 0;
                    
                    return `
                    <div class="product-card" data-idx="${index}">
                        <div class="product-image">
                            <img src="${productImage}" alt="${invest.product_name || 'Producto'}">
                            <div class="product-name-overlay">${invest.product_name || 'Producto de inversión'}</div>
                            <div class="product-progress-info">
                                <div class="progress-label">${issuedDays}/${period} días</div>
                                <div class="progress-bar-wrapper">
                                    <div class="progress-bar-fill" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="product-content">
                            <div class="product-tags">
                                <div class="info-tag price-tag">
                                    <div class="tag-label">CAPITAL</div>
                                    <div class="tag-value">\$${formatMoney(amount)}</div>
                                </div>
                                <div class="info-tag daily-tag">
                                    <div class="tag-label">DIARIO</div>
                                    <div class="tag-value">\$${formatMoney(dailyProfit)}</div>
                                </div>
                            </div>
                            <div class="product-tags">
                                <div class="info-tag days-tag">
                                    <div class="tag-label">COBRADO</div>
                                    <div class="tag-value earned">\$${formatMoney(issuedProfit)}</div>
                                </div>
                                <div class="info-tag total-tag">
                                    <div class="tag-label">TOTAL</div>
                                    <div class="tag-value">\$${formatMoney(totalReturn)}</div>
                                </div>
                            </div>
                            <div class="invest-time-info">
                                <div class="time-row">
                                    <span class="time-label">Inicio:</span>
                                    <span class="time-value">${invest.create_time ? formatDateTime(invest.create_time) : 'N/D'}</span>
                                </div>
                                <div class="time-row">
                                    <span class="time-label">Próximo rendimiento:</span>
                                    <span class="time-value">${invest.next_profit_time ? formatDateOnly(invest.next_profit_time) : 'Pendiente'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
                
            } catch (error) {
                investContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8V12L15 15"/>
                            </svg>
                        </div>
                        <p class="empty-text">Error de visualización</p>
                        <p class="empty-hint">No se pudieron mostrar las inversiones</p>
                    </div>
                `;
            }
        }
        
        function formatMoney(amount) {
            const numAmount = parseFloat(amount);
            if (isNaN(numAmount) || numAmount === null || numAmount === undefined) return '0';
            return Math.floor(numAmount).toLocaleString('es-MX');
        }
        
        function formatDateTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '';
            
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }
        
        function formatDateOnly(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '';
            
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            
            return `${day}/${month}/${year} ${hours}:${minutes}`;
